name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  notarized-release:
    runs-on: macos-26
    environment: macos-release
    env:
      KEYCHAIN_NAME: voice-input-local-build.keychain
      NOTARY_PROFILE: voice-input-local-notary
      SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate tag version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Run tests
        run: swift test

      - name: Prepare DMG builder
        run: |
          python3 -m venv "$RUNNER_TEMP/dmgbuild-venv"
          "$RUNNER_TEMP/dmgbuild-venv/bin/pip" install --requirement scripts/requirements-release.txt
          echo "DMGBUILD_PYTHON=$RUNNER_TEMP/dmgbuild-venv/bin/python" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          printf '%s' "$CERTIFICATE_P12" | base64 -D > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$RUNNER_TEMP/developer-id.p12" \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME"
          rm -f "$RUNNER_TEMP/developer-id.p12"

      - name: Configure notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, and notarize DMG
        run: ./scripts/release.sh notarized

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          gh release create "$GITHUB_REF_NAME" \
            dist/releases/"$VERSION"/* \
            --generate-notes \
            --verify-tag
